    - path: src/data/validators.py
      hash: md5
      md5: 6c2b383600233919732545fd7e7dc72d
      size: 14878
    params:
      params.yaml:
        validation:
          min_samples: 100
          max_null_ratio: 0.01
          expected_labels:
