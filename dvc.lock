    params:
      params.yaml:
        data.split_seed: 42
        data.validation_ratio: 0.1
        label_mapping:
          aspect_categories:
            anecdotes/miscellaneous: general
            ambience: ambiance
        preprocessing:
          lowercase: true
          strip_whitespace: true
          remove_duplicates: true
          drop_conflict_labels: true
          min_text_length: 3
        sentiment_derivation:
          mixed_strategy: negative_priority
    outs:
