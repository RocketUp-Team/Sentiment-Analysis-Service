data:
  dataset_name: "semeval2014_restaurants"
  splits: ["train", "test"]
  validation_ratio: 0.1
  split_seed: 42
  max_text_length: 2000

preprocessing:
  lowercase: true
  strip_whitespace: true
  remove_duplicates: true
  drop_conflict_labels: true
  min_text_length: 3

sentiment_derivation:
  mixed_strategy: "negative_priority"

label_mapping:
  aspect_categories:
    "anecdotes/miscellaneous": "general"
    "ambience": "ambiance"

validation:
  min_samples: 100
  max_null_ratio: 0.01
  expected_labels:
    sentiment: ["positive", "negative", "neutral"]
    aspect: ["food", "service", "ambiance", "price", "location", "general"]

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "data_preprocessing"
  model_experiment_name: "sentiment_baseline"

training:
  sarcasm:
    dataset_version: "tweet_eval_irony_v1"
    model_name: "xlm-roberta-base"
    adapter_output_dir: "models/adapters/sarcasm"
    learning_rate: 0.0002
    epochs: 3
    batch_size: 16
    gradient_accumulation_steps: 2
    max_length: 128
    seed: 42
  sentiment:
    dataset_version: "multilingual_sentiment_v1"
    model_name: "xlm-roberta-base"
    adapter_output_dir: "models/adapters/sentiment"
    learning_rate: 0.0002
    epochs: 5
    batch_size: 16
    gradient_accumulation_steps: 2
    max_length: 128
    seed: 42

evaluation:
  mixed_lang_eval_path: "data/eval/mixed_lang_eval.csv"
  vi_sarcasm_eval_path: "data/eval/vi_sarcasm_eval.csv"
  metrics_output_path: "reports/metrics_finetuned.json"
  per_language_output_path: "reports/per_language_f1.json"
  fairness_output_path: "reports/fairness_report.json"

adapters:
  sentiment_path: "models/adapters/sentiment"
  sarcasm_path: "models/adapters/sarcasm"

# ── Class Balancing ─────────────────────────────────────────────────────────
# Cấu hình xử lý mất cân bằng dữ liệu (class imbalance).
# Bật/tắt qua CLI: --no-balance để tắt cả hai kỹ thuật.
#
# Kết quả phân tích (check_class_balance.py):
#   tweet_eval/irony (sarcasm)     : IR=1.08x  ✅  Balanced
#   multilingual-sentiments (EN)   : IR=1.00x  ✅  Balanced
#   UIT-VSFC (VI)                  : IR=11.52x ❌  Severely imbalanced
#     → neutral class chỉ 4.3% toàn bộ dataset
#
# Kỹ thuật 1 — class_weights (áp dụng cho cả sarcasm & sentiment):
#   WeightedLossTrainer: CrossEntropyLoss(weight=inverse_freq_weights)
#
# Kỹ thuật 2 — oversample_minority (chỉ sentiment/VI):
#   Pandas RandomSampler with replacement trên training split
#   Target: neutral class đạt ≥ oversample_target_ratio của training set
class_balancing:
  use_class_weights: true
  oversample_minority: true
  oversample_target_ratio: 0.15
