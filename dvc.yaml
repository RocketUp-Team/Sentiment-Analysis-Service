stages:
  download:
    cmd: python3 -m src.data.downloader --task semeval
    deps:
      - src/data/downloader.py
      - data/external/semeval2014/
    params:
      - data.dataset_name
      - data.splits
    outs:
      # Explicit file outputs instead of data/raw/ directory to avoid overlapping
      # with download_sarcasm and download_sentiment stage outputs (DVC Issue #4 fix).
      - data/raw/sentences.csv
      - data/raw/aspects.csv

  preprocess:
    cmd: python3 -m src.data.pipeline
    deps:
      - src/data/pipeline.py
      - data/raw/sentences.csv
      - data/raw/aspects.csv
      - src/data/transforms/
    params:
      - preprocessing
      - sentiment_derivation
      - label_mapping
      - data.validation_ratio
      - data.split_seed
    outs:
      - data/processed/

  validate:
    cmd: python3 -m src.data.validators
    deps:
      - src/data/validators.py
      - data/processed/
    params:
      - validation
    metrics:
      - data/reports/quality_report.json:
          cache: false

  evaluate_baseline:
    cmd: python3 -m src.model.evaluate
    deps:
      - src/model/
      - data/processed/sentences.csv
    params:
      - params.yaml:
          - mlflow
    metrics:
      - data/reports/baseline_metrics.json:
          cache: false

  download_sarcasm:
    cmd: python3 -m src.data.downloader --task sarcasm
    deps:
      - src/data/downloader.py
    params:
      - training.sarcasm
    outs:
      - data/raw/sarcasm.csv

  download_sentiment:
    cmd: python3 -m src.data.downloader --task sentiment
    deps:
      - src/data/downloader.py
    params:
      - training.sentiment
      - sentiment_derivation
    outs:
      - data/raw/sentiment_en.csv
      - data/raw/sentiment_vi.csv

  prepare_eval:
    # Issue #3 fix: replaced the incorrect evaluate_finetuned call with the actual
    # prepare_eval script that creates data/eval/ from raw sentiment test splits.
    cmd: python3 -m src.scripts.prepare_eval
    deps:
      - src/scripts/prepare_eval.py
      - data/raw/sentiment_en.csv
      - data/raw/sentiment_vi.csv
    params:
      - evaluation
    outs:
      - data/eval/

  finetune_sarcasm:
    cmd: python3 -m src.scripts.run_finetuning --task sarcasm
    deps:
      - src/scripts/run_finetuning.py
      - src/training/
      - data/raw/sarcasm.csv
    params:
      - training.sarcasm
      - mlflow
      - adapters
    outs:
      - models/adapters/sarcasm

  finetune_sentiment:
    cmd: python3 -m src.scripts.run_finetuning --task sentiment
    deps:
      - src/scripts/run_finetuning.py
      - src/training/
      - data/raw/sentiment_en.csv
      - data/raw/sentiment_vi.csv
    params:
      - training.sentiment
      - mlflow
      - adapters
    outs:
      - models/adapters/sentiment

  evaluate_finetuned:
    cmd: python3 -m src.scripts.evaluate_finetuned --task sentiment
    deps:
      - src/scripts/evaluate_finetuned.py
      - src/model/
      - models/adapters/sarcasm
      - models/adapters/sentiment
      - data/eval/
    params:
      - evaluation
      - adapters
    metrics:
      - reports/metrics_finetuned.json:
          cache: false
      - reports/per_language_f1.json:
          cache: false
      - reports/fairness_report.json:
          cache: false
