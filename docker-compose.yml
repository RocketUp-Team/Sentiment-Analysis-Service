
services:
  fastapi_app:
    build:
      context: .
      args:
        - DAGSHUB_USERNAME=${DAGSHUB_USERNAME}
        - DAGSHUB_TOKEN=${DAGSHUB_TOKEN}
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      # Give PyTorch / ONNX Runtime access to all CPU threads
      - OMP_NUM_THREADS=6
      - MKL_NUM_THREADS=6
    depends_on:
      - mlflow
    deploy:
      resources:
        limits:
          cpus: '6.0'       # was 1.5  → 6 cores for ML inference
          memory: 10G       # was 4G   → 10 GB for model + batch buffers
        reservations:
          cpus: '2.0'
          memory: 4G
    networks:
      - sentiment-network

  frontend:
    build:
      context: ./app/sentiment-analysis-chatbot
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - fastapi_app
    deploy:
      resources:
        limits:
          cpus: '0.50'      # was 0.25
          memory: 512M
    networks:
      - sentiment-network

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9091:9090"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - sentiment-network

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sentiment-network

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.4.1
    ports:
      - "5005:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
    networks:
      - sentiment-network

  # ── Training service ─────────────────────────────────────────────────────────
  # Chạy: docker compose --profile train up trainer
  # Hoặc smoke test: docker compose --profile train run --rm trainer python -m src.scripts.run_finetuning --task sentiment --smoke
  trainer:
    profiles: ["train"]
    build:
      context: .
      dockerfile: Dockerfile.train
    environment:
      # MLflow log ra thư mục local (mount vào host)
      - MLFLOW_TRACKING_URI=file:///app/mlruns
      # Tăng số threads cho training CPU
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      # HuggingFace cache trong container (tránh re-download mỗi lần)
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
    volumes:
      # Data CSVs (tải trước bằng DVC hoặc script downloader)
      - ./data:/app/data
      # Adapter output sẽ được lưu vào đây
      - ./models:/app/models
      # MLflow runs persist trên host
      - ./mlruns:/app/mlruns
      # Reports (metrics JSON, class balance report)
      - ./reports:/app/reports
      # HuggingFace model cache (tránh download lại khi rebuild image)
      - huggingface_cache:/app/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 12G
        reservations:
          cpus: '2.0'
          memory: 4G
    networks:
      - sentiment-network

networks:
  sentiment-network:
    driver: bridge

volumes:
  # Shared HuggingFace model cache giữa các lần train
  huggingface_cache:
